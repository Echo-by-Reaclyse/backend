services:
  api:
    build: .
    image: echo-api
    container_name: echo-api
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
